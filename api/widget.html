<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoGreenPower — Βοηθός</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

        #chat-toggle {
            position: fixed; bottom: 24px; right: 24px;
            width: 60px; height: 60px; border-radius: 50%;
            background: #1a5276; color: white; border: none;
            cursor: pointer; font-size: 26px;
            box-shadow: 0 4px 16px rgba(26,82,118,0.5);
            z-index: 1000; transition: transform 0.2s, background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        #chat-toggle:hover { background: #154360; transform: scale(1.05); }

        #chat-window {
            position: fixed; bottom: 96px; right: 24px;
            width: 370px; height: 520px;
            background: white; border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: flex; flex-direction: column;
            z-index: 1000; overflow: hidden;
            transition: opacity 0.2s, transform 0.2s;
        }
        #chat-window.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }

        #chat-header {
            background: #1a5276; color: white;
            padding: 16px 20px;
            display: flex; align-items: center; gap: 12px;
        }
        #chat-header .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        #chat-header .info h3 { font-size: 15px; font-weight: 600; }
        #chat-header .info span { font-size: 12px; opacity: 0.8; }
        #voice-toggle-btn {
            margin-left: auto; background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3); color: white;
            border-radius: 20px; padding: 6px 12px; font-size: 12px;
            cursor: pointer; transition: background 0.2s; white-space: nowrap;
        }
        #voice-toggle-btn:hover { background: rgba(255,255,255,0.25); }
        #voice-toggle-btn.active { background: rgba(255,255,255,0.35); }

        #chat-messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .message {
            max-width: 85%; padding: 10px 14px;
            border-radius: 14px; font-size: 14px;
            line-height: 1.5; word-break: break-word;
        }
        .message.bot {
            background: #f0f4f8; color: #1e293b;
            align-self: flex-start; border-bottom-left-radius: 4px;
        }
        .message.user {
            background: #1a5276; color: white;
            align-self: flex-end; border-bottom-right-radius: 4px;
        }
        .message.error { background: #fee2e2; color: #dc2626; align-self: flex-start; }

        .typing {
            display: flex; gap: 4px; padding: 12px 14px;
            background: #f0f4f8; border-radius: 14px;
            border-bottom-left-radius: 4px; align-self: flex-start;
        }
        .typing span {
            width: 8px; height: 8px; background: #94a3b8;
            border-radius: 50%; animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        #chat-input-area {
            padding: 12px 16px; border-top: 1px solid #e2e8f0;
            display: flex; gap: 8px; align-items: center;
        }
        #chat-input {
            flex: 1; border: 1px solid #e2e8f0; border-radius: 24px;
            padding: 10px 16px; font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        #chat-input:focus { border-color: #1a5276; }
        #chat-send {
            width: 42px; height: 42px; background: #1a5276;
            color: white; border: none; border-radius: 50%;
            cursor: pointer; font-size: 16px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        #chat-send:hover { background: #154360; }
        #chat-send:disabled { background: #94a3b8; cursor: not-allowed; }

        @media (max-width: 420px) {
            #chat-window { right:0; bottom:0; width:100%; height:100%; border-radius:0; }
        }
    </style>
</head>
<body>

<button id="chat-toggle" title="Βοηθός EcoGreenPower">⚡</button>

<div id="chat-window" class="hidden">
    <div id="chat-header">
        <div class="avatar">⚡</div>
        <div class="info">
            <h3>Βοηθός EcoGreenPower</h3>
            <span>Πώς μπορώ να σας βοηθήσω;</span>
        </div>
        <button id="voice-toggle-btn" onclick="toggleVoice()">🔊 Φωνή</button>
    </div>

    <div id="chat-messages"></div>

    <div id="chat-input-area">
        <input type="text" id="chat-input"
            placeholder="π.χ. Χρειάζομαι σχέδιο ΔΕΗ..."
            maxlength="500" autocomplete="off"/>
        <button id="chat-send">➤</button>
    </div>
</div>

<script>
    const API_BASE  = "http://localhost:5001";
    const CHAT_URL  = API_BASE + "/chat";
    const VOICE_URL = API_BASE + "/voice";

    let isOpen      = false;
    let voiceMode   = false;
    let chatHistory = [];

    const toggleBtn  = document.getElementById("chat-toggle");
    const chatWindow = document.getElementById("chat-window");
    const messages   = document.getElementById("chat-messages");
    const input      = document.getElementById("chat-input");
    const sendBtn    = document.getElementById("chat-send");
    const voiceBtn   = document.getElementById("voice-toggle-btn");

    toggleBtn.addEventListener("click", () => {
        isOpen = !isOpen;
        chatWindow.classList.toggle("hidden", !isOpen);
        toggleBtn.textContent = isOpen ? "✕" : "⚡";
        if (isOpen && messages.children.length === 0) {
            addMessage("bot", "Γεια σας! Είμαι ο Βλάσης, βοηθός της EcoGreenPower. Πώς μπορώ να σας βοηθήσω;");
        }
        if (isOpen) input.focus();
    });

    function toggleVoice() {
        voiceMode = !voiceMode;
        voiceBtn.textContent = voiceMode ? "🔇 Χωρίς φωνή" : "🔊 Φωνή";
        voiceBtn.classList.toggle("active", voiceMode);
    }

    input.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener("click", sendMessage);

    function addMessage(role, text) {
        const div = document.createElement("div");
        div.className = `message ${role}`;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
    }

    function addTyping() {
        const div = document.createElement("div");
        div.className = "typing"; div.id = "typing";
        div.innerHTML = "<span></span><span></span><span></span>";
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    function setLoading(v) { sendBtn.disabled = v; input.disabled = v; }

    function playAudio(base64data, mimeType) {
        const audio = new Audio(`data:${mimeType};base64,${base64data}`);
        audio.play().catch(e => console.warn("Audio error:", e));
    }

    async function sendMessage() {
        const question = input.value.trim();
        if (!question) return;

        addMessage("user", question);
        input.value = "";
        setLoading(true);
        addTyping();

        const endpoint = voiceMode ? VOICE_URL : CHAT_URL;

        try {
            const res = await fetch(endpoint, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ question, history: chatHistory })
            });

            removeTyping();
            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const data = await res.json();

            if (data.error) {
                addMessage("error", "Σφάλμα: " + data.error);
            } else {
                addMessage("bot", data.answer);
                if (data.audio_base64) {
                    playAudio(data.audio_base64, data.audio_type || "audio/mpeg");
                }
                chatHistory.push({role: "user",      content: question});
                chatHistory.push({role: "assistant", content: data.answer});
                if (chatHistory.length > 12) chatHistory = chatHistory.slice(-12);
            }

        } catch (err) {
            removeTyping();
            addMessage("error", "Δεν ήταν δυνατή η σύνδεση. Δοκιμάστε ξανά.");
            console.error(err);
        } finally {
            setLoading(false);
            input.focus();
        }
    }
</script>
</body>
</html>
